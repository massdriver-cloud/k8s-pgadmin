schema: draft-07
name: k8s-pgadmin
version: 1.0.0
description: pgAdmin4 is the leading Open Source management tool for Postgres, providing a powerful graphical interface that simplifies the creation, maintenance and use of database objects.
source_url: https://github.com/massdriver-cloud/k8s-pgadmin
type: application
steps:
- path: chart
  provisioner: helm
  config:
    namespace: ".params.provisioner.namespace"
params:
  required:
  - provisioner
  - replicaCount
  - env
  - resources
  properties:
    provisioner:
      type: object
      title: Provisioner Configuration
      required:
      - namespace
      properties:
        namespace:
          title: Namespace
          type: string
    replicaCount:
      type: integer
      title: replicaCount
      default: 1
      minimum: 1
    env:
      required:
      - email
      - password
      properties:
        email:
          type: string
          title: email
          description: can be email or nickname
          default: chart@domain.com
        password:
          type: string
          title: password
          format: password
      type: object
      title: env
    resources:
      properties:
        requests:
          properties:
            cpu:
              type: number
              title: cpu
              default: 0.1
              minimum: 0.001
            memory:
              type: integer
              title: memory
          type: object
          required:
          - cpu
          - memory
          title: requests
          description: resource requests
      type: object
      required:
      - requests
      title: resources
  type: object
connections:
  required:
  - kubernetes_cluster
  - database
  properties:
    kubernetes_cluster:
      "$ref": massdriver/kubernetes-cluster
    database:
      "$ref": massdriver/postgresql-authentication
artifacts:
  required:
  - internal
  properties:
    internal:
      "$ref": massdriver/api
ui:
  ui:order:
  - provisioner
  - replicaCount
  - env
  - resources
  - "*"
  resources:
    requests:
      memory:
        ui:field: conversionFieldData
        unit: Bytes
